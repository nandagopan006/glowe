{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glowé Admin — Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f7f5ef; min-height: 100vh; }

    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 40px rgba(50,80,50,0.10), 0 1px 6px rgba(50,80,50,0.05);
    }
    .input-wrap {
      border: 1.5px solid #dce8d8;
      border-radius: 10px;
      background: #f8fbf7;
      display: flex; align-items: center;
      padding: 0 14px; gap: 10px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap:focus-within {
      border-color: #5c9a5c;
      box-shadow: 0 0 0 3px rgba(92,154,92,.12);
    }
    .input-wrap input {
      flex: 1; background: transparent; outline: none;
      font-size: 0.875rem; color: #2d4a2d;
      padding: 12px 0; letter-spacing: .1em;
    }
    .input-wrap input::placeholder { color: #a8bea8; letter-spacing: 0; }
    .eye-btn { color: #a8bea8; cursor: pointer; flex-shrink:0; transition: color .15s; background:none; border:none; padding:0; }
    .eye-btn:hover { color: #5c9a5c; }

    .btn {
      background: #3d6b3d; color: #fff;
      border-radius: 10px; font-weight: 500;
      font-size: 0.875rem; padding: 13px; width: 100%;
      display: flex; align-items: center; justify-content: center;
      transition: background .18s, transform .12s, box-shadow .18s;
      box-shadow: 0 2px 14px rgba(60,107,60,.25);
      cursor: pointer; letter-spacing: .02em; border: none;
    }
    .btn:hover { background: #315831; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(60,107,60,.32); }
    .btn:active { transform: translateY(0); }

    .back-link {
      color: #6b8c6b; font-size: 0.875rem;
      display: inline-flex; align-items: center; gap: 6px;
      cursor: pointer; transition: color .15s; text-decoration: none;
    }
    .back-link:hover { color: #4e8b4e; }

    .footer-txt { color: #a8bea8; font-size: 0.72rem; }
    .label-upper { font-size: 0.68rem; font-weight: 600; color: #9aaa9a; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; display: block; }

    /* password hint */
    .hint-text { font-size: 0.72rem; color: #a8bea8; margin-top: 5px; }

    /* ═══════════════════════════
       TOAST
    ═══════════════════════════ */
    #toast-container {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 20px; border-radius: 14px;
      font-size: .875rem; font-weight: 500;
      min-width: 280px; max-width: 380px;
      pointer-events: all;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.08);
      backdrop-filter: blur(12px);
      position: relative; overflow: hidden;
      animation: toastIn .35s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    .toast.hide { animation: toastOut .3s ease forwards; }
    .toast-error   { background: rgba(255,240,240,0.97); border: 1.5px solid #fbbfbf; color: #c0392b; }
    .toast-success { background: rgba(240,250,240,0.97); border: 1.5px solid #a0d0a0; color: #2f6232; }
    .toast-warning { background: rgba(255,251,235,0.97); border: 1.5px solid #fcd34d; color: #92400e; }
    .toast-progress { position: absolute; bottom: 0; left: 0; height: 3px; border-radius: 0 0 14px 14px; animation: toastProgress 3s linear forwards; }
    .toast-error   .toast-progress { background: #e05555; }
    .toast-success .toast-progress { background: #4a9050; }
    .toast-warning .toast-progress { background: #f59e0b; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-16px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-10px) scale(0.95); }
    }
    @keyframes toastProgress {
      from { width: 100%; }
      to   { width: 0%; }
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Django messages → toasts -->
  {% if messages %}
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        {% for message in messages %}
          showToast(
            "{{ message|escapejs }}",
            "{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% else %}warning{% endif %}"
          );
        {% endfor %}
      });
    </script>
  {% endif %}

  <div class="flex-1 flex items-center justify-center px-4 py-10">
    <div class="card w-full max-w-[420px] px-8 sm:px-10 py-10 flex flex-col items-center">

      <!-- Brand header -->
      <div class="flex items-center gap-2 mb-6">
        <svg class="w-5 h-5" style="color:#5c9a5c" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 2C9 5.5 6 9 6 13a6 6 0 0012 0c0-4-3-7.5-6-11z"/>
        </svg>
        <span style="font-weight:700; font-size:1rem; color:#1a2e1a;">Glowé</span>
      </div>

      <!-- Title -->
      <div class="flex items-center gap-2.5 mb-8">
        <h1 style="font-family:'Playfair Display',serif" class="text-[26px] font-bold text-gray-900">Reset Password</h1>
        <svg class="w-5 h-5 flex-shrink-0" style="color:#5c9a5c" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
          <rect x="5" y="9" width="14" height="12" rx="2"/>
          <path stroke-linecap="round" d="M8 9V7a4 4 0 018 0v2"/>
          <circle cx="12" cy="15" r="1.2" fill="#5c9a5c" stroke="none"/>
        </svg>
      </div>

      <!-- Form -->
      <form method="POST" action="{% url 'admin_reset_password' %}" class="w-full">
        {% csrf_token %}

        <!-- New Password -->
        <div class="w-full mb-4">
          <label for="password" class="label-upper">New Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="New password"
            />
            <button type="button" class="eye-btn"
              onclick="var i=document.getElementById('password'); i.type=i.type==='password'?'text':'password'; this.querySelector('.e1o').classList.toggle('hidden'); this.querySelector('.e1c').classList.toggle('hidden');">
              <svg class="e1o w-[17px] h-[17px]" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="e1c w-[17px] h-[17px] hidden" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20C5 20 1 12 1 12a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <!-- password rule hint matches your view regex -->
          <p class="hint-text">Min 8 chars, 1 uppercase, 1 number, 1 special (!@#$%^&*)</p>
        </div>

        <!-- Confirm Password -->
        <div class="w-full mb-6">
          <label for="confirm_password" class="label-upper">Confirm New Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="confirm_password"
              name="confirm_password"
              placeholder="Confirm password"
            />
            <button type="button" class="eye-btn"
              onclick="var i=document.getElementById('confirm_password'); i.type=i.type==='password'?'text':'password'; this.querySelector('.e2o').classList.toggle('hidden'); this.querySelector('.e2c').classList.toggle('hidden');">
              <svg class="e2o w-[17px] h-[17px]" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="e2c w-[17px] h-[17px] hidden" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20C5 20 1 12 1 12a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Save -->
        <button type="submit" class="btn mb-5">Save Changes</button>

      </form>

      <!-- Back -->
      <a href="{% url 'admin_signin' %}" class="back-link">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Back to Sign In
      </a>

    </div>
  </div>

  <!-- Footer -->
  <footer class="flex justify-center pb-8">
    <span class="footer-txt">© 2024 Glowé Platform. All rights reserved.</span>
  </footer>

  <script>
    function showToast(message, type) {
      const container = document.getElementById('toast-container');
      const icons = {
        error:   `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 8v4M12 16h.01"/></svg>`,
        success: `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`,
        warning: `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>`,
      };
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        ${icons[type] || icons.error}
        <span style="flex:1">${message}</span>
        <button onclick="dismissToast(this.parentElement)" style="background:none;border:none;cursor:pointer;padding:0;opacity:.6;" aria-label="Close">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <div class="toast-progress"></div>
      `;
      container.appendChild(toast);
      const timer = setTimeout(() => dismissToast(toast), 3000);
      toast._timer = timer;
    }

    function dismissToast(toast) {
      if (!toast) return;
      clearTimeout(toast._timer);
      toast.classList.add('hide');
      setTimeout(() => toast.remove(), 300);
    }
  </script>

</body>
</html>
