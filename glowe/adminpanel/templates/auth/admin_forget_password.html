{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glowé Admin — Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Playfair Display', 'serif'],
            sans: ['DM Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }

    .bg-page {
      background: radial-gradient(ellipse at 10% 30%, #c8ddc5 0%, #ddeada 30%, #edf2ea 60%, #f5f3ec 100%);
      min-height: 100vh;
    }
    .card {
      background: #ffffff; border-radius: 20px;
      box-shadow: 0 4px 40px rgba(50,80,50,0.10), 0 1px 6px rgba(50,80,50,0.05);
    }
    .icon-badge {
      background: #e4f0e2; border-radius: 14px;
      width: 58px; height: 58px;
      display: flex; align-items: center; justify-content: center;
    }
    .input-wrap {
      border: 1.5px solid #dce8d8; border-radius: 10px;
      background: #f8fbf7; display: flex; align-items: center;
      padding: 0 14px; gap: 10px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap:focus-within { border-color: #5c9a5c; box-shadow: 0 0 0 3px rgba(92,154,92,.13); }
    .input-wrap input {
      flex: 1; background: transparent; outline: none;
      font-size: 0.875rem; color: #2d4a2d; padding: 12px 0;
    }
    .input-wrap input::placeholder { color: #a8bea8; }

    /* ── BUTTON ── */
    .btn {
      background: #5c9a5c; color: #fff; border-radius: 10px;
      font-weight: 500; font-size: 0.9rem; padding: 13px; width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .18s, transform .12s, box-shadow .18s;
      box-shadow: 0 2px 14px rgba(78,139,78,.22);
      cursor: pointer; border: none; position: relative; overflow: hidden;
    }
    .btn:hover:not(:disabled) { background: #4e8b4e; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(78,139,78,.30); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.80; cursor: not-allowed; transform: none; }

    /* shimmer */
    @keyframes shimmer { 0%{transform:translateX(-100%) skewX(-12deg);} 100%{transform:translateX(220%) skewX(-12deg);} }
    .btn.loading::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,0.18) 50%,transparent 70%);
      animation:shimmer 1.3s ease-in-out infinite;
    }

    /* spinner */
    @keyframes spin { to { transform:rotate(360deg); } }
    .btn-spinner {
      display:inline-block; width:16px; height:16px;
      border:2px solid rgba(255,255,255,0.35); border-top-color:#fff;
      border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0;
    }

    .back-link {
      color: #6b8c6b; font-size: 0.875rem;
      display: inline-flex; align-items: center; gap: 6px;
      cursor: pointer; transition: color .15s; text-decoration: none;
    }
    .back-link:hover { color: #4e8b4e; }
    .footer-link { color: #a8bea8; font-size: 0.72rem; letter-spacing: .05em; cursor: pointer; transition: color .15s; }
    .footer-link:hover { color: #5c9a5c; }
    .footer-dot { color: #c5d8c5; font-size: 0.72rem; }

    /* ── TOAST ── */
    #toast-container {
      position:fixed; top:24px; left:50%; transform:translateX(-50%);
      z-index:9999; display:flex; flex-direction:column; align-items:center;
      gap:10px; pointer-events:none;
    }
    .toast {
      display:flex; align-items:center; gap:10px; padding:13px 20px;
      border-radius:14px; font-size:.875rem; font-weight:500;
      min-width:280px; max-width:380px; pointer-events:all;
      box-shadow:0 8px 32px rgba(0,0,0,0.14),0 2px 8px rgba(0,0,0,0.08);
      backdrop-filter:blur(12px); position:relative; overflow:hidden;
      animation:toastIn .35s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    .toast.hide { animation:toastOut .3s ease forwards; }
    .toast-error   { background:rgba(255,240,240,0.97); border:1.5px solid #fbbfbf; color:#c0392b; }
    .toast-success { background:rgba(240,250,240,0.97); border:1.5px solid #a0d0a0; color:#2f6232; }
    .toast-warning { background:rgba(255,251,235,0.97); border:1.5px solid #fcd34d; color:#92400e; }
    .toast-progress { position:absolute; bottom:0; left:0; height:3px; border-radius:0 0 14px 14px; animation:toastProgress 3s linear forwards; }
    .toast-error   .toast-progress { background:#e05555; }
    .toast-success .toast-progress { background:#4a9050; }
    .toast-warning .toast-progress { background:#f59e0b; }
    @keyframes toastIn       { from{opacity:0;transform:translateY(-16px) scale(0.95);} to{opacity:1;transform:translateY(0) scale(1);} }
    @keyframes toastOut      { from{opacity:1;transform:translateY(0) scale(1);} to{opacity:0;transform:translateY(-10px) scale(0.95);} }
    @keyframes toastProgress { from{width:100%;} to{width:0%;} }
  </style>
</head>
<body>

  <div id="toast-container"></div>

  {% if messages %}
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      {% for message in messages %}
        showToast(
          "{{ message|escapejs }}",
          "{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% else %}warning{% endif %}"
        );
      {% endfor %}
    });
  </script>
  {% endif %}

  <div class="bg-page flex flex-col">

    <!-- Card -->
    <div class="flex-1 flex items-center justify-center px-4 py-10">
      <div class="card w-full max-w-[400px] px-8 sm:px-10 py-10 flex flex-col items-center">

        <!-- Icon -->
        <div class="icon-badge mb-6">
          <svg class="w-7 h-7" style="color:#5c9a5c" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4a4 4 0 014 4v1H8V8a4 4 0 014-4z"/>
            <rect x="4" y="9" width="16" height="11" rx="2"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 7.5A5 5 0 107 9" stroke-width="1.5"/>
            <polyline points="17,5 17,7.5 14.5,7.5" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"/>
          </svg>
        </div>

        <h1 style="font-family:'Playfair Display',serif" class="text-[28px] font-bold text-gray-900 mb-2 text-center">Forgot Password</h1>
        <p class="text-gray-500 text-sm text-center mb-7 leading-relaxed">Enter your admin email to receive an OTP.</p>

        <!-- Form -->
        <form method="POST" action="{% url 'admin_forget_password' %}" class="w-full" id="forgotForm">
          {% csrf_token %}

          <!-- Email — ✅ value preserved on error -->
          <div class="w-full mb-5">
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Work Email</label>
            <div class="input-wrap">
              <svg class="w-[17px] h-[17px] flex-shrink-0" style="color:#a8bea8" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
                <rect x="2" y="4" width="20" height="16" rx="3"/>
                <path stroke-linecap="round" d="M2 8l10 7 10-7"/>
              </svg>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="admin@glowe.com"
                autocomplete="email"
                value="{{ submitted_email|default:'' }}"
              />
            </div>
          </div>

          <!-- Submit with loader -->
          <button type="submit" id="sendBtn" class="btn mb-5">
            <span id="sendBtnContent" class="flex items-center justify-center gap-2">
              Send OTP
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
              </svg>
            </span>
          </button>

        </form>

        <!-- Back -->
        <a href="{% url 'admin_signin' %}" class="back-link">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
          Back to Sign In
        </a>

      </div>
    </div>

    <!-- Footer -->
    <footer class="flex flex-col items-center pb-8 gap-2">
      <div class="flex items-center gap-4">
        <span class="footer-link uppercase">Privacy Policy</span>
        <span class="footer-dot">•</span>
        <span class="footer-link uppercase">Terms of Service</span>
      </div>
      <span class="footer-dot" style="letter-spacing:.04em">© 2024 GLOWÉ INTERNATIONAL</span>
    </footer>

  </div>

  <script>
    // ── TOAST ──
    function showToast(message, type) {
      const container = document.getElementById('toast-container');
      const icons = {
        error:   `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 8v4M12 16h.01"/></svg>`,
        success: `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`,
        warning: `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>`,
      };
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        ${icons[type] || icons.error}
        <span style="flex:1">${message}</span>
        <button onclick="dismissToast(this.parentElement)" style="background:none;border:none;cursor:pointer;padding:0;opacity:.6;" aria-label="Close">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <div class="toast-progress"></div>
      `;
      container.appendChild(toast);
      toast._timer = setTimeout(() => dismissToast(toast), 3000);
    }
    function dismissToast(toast) {
      if (!toast) return;
      clearTimeout(toast._timer);
      toast.classList.add('hide');
      setTimeout(() => toast.remove(), 300);
    }

    // ── LOADER ON SUBMIT ──
    document.getElementById('forgotForm').addEventListener('submit', function(e) {
      const email = document.getElementById('email').value.trim();

      if (!email) {
        e.preventDefault();
        showToast('Please enter your email address.', 'error');
        return;
      }

      // ✅ Show loader
      const btn     = document.getElementById('sendBtn');
      const content = document.getElementById('sendBtnContent');
      btn.disabled  = true;
      btn.classList.add('loading');
      content.innerHTML = `
        <span class="btn-spinner"></span>
        <span style="font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.05em;">Sending OTP...</span>
      `;
    });
  </script>

</body>
</html>
