{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glowé – Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            cormorant: ['Cormorant Garamond', 'serif'],
            montserrat: ['Montserrat', 'sans-serif'],
          },
          colors: {
            brand: {
              dark:        '#2a1f14',
              darker:      '#3d2e20',
              bg:          '#f5f2ed',
              muted:       '#7a6e64',
              label:       '#4a3f35',
              border:      '#c4b9af',
              placeholder: '#b0a49a',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{% static 'accounts/css/reset_password.css' %}">
</head>
<body class="flex h-screen overflow-hidden font-montserrat">

  <!-- ── TOAST CONTAINER — added for toast messages ── -->
  <div id="toastContainer"
    class="fixed top-5 z-50 flex flex-col gap-2 pointer-events-none"
    style="left:50%; transform:translateX(-50%); align-items:center;">
  </div>

  <!-- ── LEFT PANEL ── -->
  <div class="left-panel relative hidden md:block w-1/2 h-screen flex-shrink-0 overflow-hidden">
    <img
      src="https://i.pinimg.com/736x/87/73/ac/8773ac09c14bccb57938093b456d2884.jpg"
      alt="Glowé Women"
      class="w-full h-full object-cover object-top"
    />
    <div class="absolute bottom-10 left-10">
      <h2 class="font-cormorant italic font-semibold text-white text-2xl lg:text-3xl xl:text-4xl leading-tight">
        Glowé Women
      </h2>
    </div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right-panel w-full md:w-1/2 h-screen bg-[#f5f2ed] flex items-center justify-center overflow-hidden px-8 sm:px-12 lg:px-16">
    <div class="w-full max-w-[400px] flex flex-col items-center">

      <!-- Brand Logo -->
      <div class="anim-1 flex justify-center mb-8 lg:mb-10">
        <img src="{{ logo_url }}" alt="Glowé Logo" class="w-[200px] sm:w-[220px] lg:w-[250px] h-auto object-contain">
      </div>

      <!-- Heading -->
      <h1 class="anim-2 font-cormorant font-normal text-brand-dark text-[36px] lg:text-[46px] xl:text-[52px] leading-tight text-left w-full mb-6 lg:mb-8">
        Reset Password
      </h1>

      <!-- ── HIDDEN ERROR SPAN — read by JS to show toast ── -->
      {% if error %}
        <span id="form-error" class="hidden">{{ error }}</span>
      {% endif %}

      <!-- FORM -->
      <form action="{% url 'reset_password' uidb64=uidb64 token=token %}" method="POST" class="w-full">
        {% csrf_token %}

        <!-- New Password -->
        <div class="anim-3 w-full mb-5 lg:mb-6">
          <label for="new_password" class="block text-[10px] font-semibold tracking-[0.16em] text-brand-label uppercase mb-2">
            New Password
          </label>
          <div class="relative">
            <input
              class="input-field"
              type="password"
              id="new_password"
              name="new_password"
              placeholder="Enter your new password"
              autocomplete="new-password"
              required
            />
            <button
              type="button"
              onclick="togglePwd('new_password', this)"
              aria-label="Toggle password visibility"
              class="absolute right-0.5 top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer text-brand-placeholder flex items-center p-0">
              <svg class="w-[17px] h-[17px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Confirm New Password -->
        <div class="anim-4 w-full mb-8 lg:mb-10">
          <label for="confirm_password" class="block text-[10px] font-semibold tracking-[0.16em] text-brand-label uppercase mb-2">
            Confirm New Password
          </label>
          <div class="relative">
            <input
              class="input-field"
              type="password"
              id="confirm_password"
              name="confirm_password"
              placeholder="Confirm your new password"
              autocomplete="new-password"
              required
            />
            <button
              type="button"
              onclick="togglePwd('confirm_password', this)"
              aria-label="Toggle confirm password visibility"
              class="absolute right-0.5 top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer text-brand-placeholder flex items-center p-0">
              <svg class="w-[17px] h-[17px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Update Password Button -->
        <button type="submit"
          class="anim-5 w-full py-[15px] lg:py-[17px] px-5 bg-brand-dark hover:bg-brand-darker text-[#f5f2ed] font-montserrat text-[11px] font-semibold tracking-[0.2em] uppercase border-none cursor-pointer flex items-center justify-center transition-colors duration-200">
          Update Password
        </button>

      </form>

      <!-- Back Link -->
      {% if user.is_authenticated %}
        <a href="{% url 'profile_overview' %}"
          class="anim-6 mt-8 lg:mt-10 text-[11px] font-semibold tracking-[0.14em] text-brand-dark uppercase no-underline border-b border-brand-dark pb-0.5 hover:opacity-70 transition-opacity duration-200">
          Back to Profile
        </a>
      {% else %}
        <a href="{% url 'signin' %}"
          class="anim-6 mt-8 lg:mt-10 text-[11px] font-semibold tracking-[0.14em] text-brand-dark uppercase no-underline border-b border-brand-dark pb-0.5 hover:opacity-70 transition-opacity duration-200">
          Back to Sign In
        </a>
      {% endif %}

    </div>
  </div>

  <script src="{% static 'accounts/js/reset_password.js' %}"></script>

</body>
</html>
