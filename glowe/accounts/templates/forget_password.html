{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glowé – Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            cormorant: ['Cormorant Garamond', 'serif'],
            montserrat: ['Montserrat', 'sans-serif'],
          },
          colors: {
            brand: {
              dark:    '#2a1f14',
              darker:  '#3d2e20',
              bg:      '#f5f2ed',
              muted:   '#7a6e64',
              label:   '#4a3f35',
              border:  '#e2dbd4',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{% static 'accounts/css/forget_password.css' %}">
</head>

<body class="flex h-screen overflow-hidden font-montserrat">

  <!-- ── TOAST CONTAINER ── -->
  <div id="toastContainer"
    class="fixed top-5 z-50 flex flex-col gap-2 pointer-events-none"
    style="left:50%; transform:translateX(-50%); align-items:center;">
  </div>

  <!-- ── LEFT PANEL ── -->
  <div class="left-panel relative hidden md:block w-1/2 h-screen flex-shrink-0 overflow-hidden">
    <img
      src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=900&q=80"
      alt="Glowé"
      class="w-full h-full object-cover object-center"
    />
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right-panel w-full md:w-1/2 h-screen bg-[#f5f2ed] flex items-center justify-center overflow-hidden px-8 sm:px-12 lg:px-16">
    <div class="w-full max-w-[400px] flex flex-col items-center text-center">

      <!-- Brand Logo -->
      <div class="anim-1 flex justify-center mb-6 lg:mb-8">
        <img src="{{ logo_url }}" alt="Glowé Logo" class="w-[200px] sm:w-[220px] lg:w-[250px] h-auto object-contain">
      </div>

      <!-- Heading -->
      <h1 class="anim-2 font-cormorant font-bold text-brand-dark text-[34px] lg:text-[42px] xl:text-[48px] leading-tight mb-3">
        Forgot Password?
      </h1>

      <!-- Subtitle -->
      <p class="anim-3 text-brand-muted text-[12px] lg:text-[13px] font-light leading-relaxed mb-7 lg:mb-8 max-w-[320px]">
        Please enter your email address to receive a password reset link.
      </p>

      <!-- hidden error span — read by JS to show toast -->
      {% if error %}
        <span id="form-error" class="hidden">{{ error }}</span>
      {% endif %}

      <!-- FORM -->
      <form action="{% url 'forget_password' %}" method="POST" class="w-full">
        {% csrf_token %}

        <!-- Honeypot field (Spam protection) -->
        <div style="display:none;">
          <input type="text" name="website_url" tabindex="-1" autocomplete="off">
        </div>

        <!-- Email Field -->
        <div class="anim-4 w-full mb-5 text-left">
          <label for="email" class="block text-[10px] font-semibold tracking-[0.16em] text-brand-label uppercase mb-2">
            Email Address
          </label>
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-[16px] h-[16px] text-[#b0a49a]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M2 7l10 7 10-7"/>
            </svg>
            <input
  class="email-input {% if error %}input-error{% endif %}"
  type="email"
  id="email"
  name="email"
  placeholder="Enter your email address"
  autocomplete="email"
  value="{{ submitted_email|default:prefill_email }}"
  {% if prefill_email %}readonly{% endif %}
  required
/>
          </div>
        </div>

        <!-- Submit Button — JS adds btn-loading class on submit -->
        <button type="submit"
          class="anim-5 w-full py-[15px] lg:py-[17px] px-5 bg-brand-dark hover:bg-brand-darker text-[#f5f2ed] font-montserrat text-[11px] font-semibold tracking-[0.2em] uppercase border-none cursor-pointer flex items-center justify-center rounded-lg transition-colors duration-200">
          Send Reset Link
        </button>

      </form>

      {% if user.is_authenticated %}
      <a href="{% url 'change_password' %}"
        class="anim-6 mt-8 lg:mt-10 text-[11px] text-brand-muted font-normal tracking-[0.12em] uppercase no-underline hover:text-brand-dark transition-colors duration-200 flex items-center gap-1.5">
        <span>←</span>
        <span>Back to Change Password</span>
      </a>
      {% else %}
      <a href="{% url 'signin' %}"
        class="anim-6 mt-8 lg:mt-10 text-[11px] text-brand-muted font-normal tracking-[0.12em] uppercase no-underline hover:text-brand-dark transition-colors duration-200 flex items-center gap-1.5">
        <span>←</span>
        <span>Back to Sign In</span>
      </a>
      {% endif %}

    </div>
  </div>

  <script src="{% static 'accounts/js/forget_password.js' %}"></script>

</body>
</html>
