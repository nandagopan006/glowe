{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glowé – Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            cormorant: ['Cormorant Garamond', 'serif'],
            montserrat: ['Montserrat', 'sans-serif'],
          },
          colors: {
            brand: {
              dark:    '#2a1f14',
              darker:  '#3d2e20',
              bg:      '#f5f2ed',
              muted:   '#7a6e64',
              label:   '#4a3f35',
              border:  '#e2dbd4',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{% static 'accounts/css/forget_password.css' %}">
</head>
<body class="flex h-screen overflow-hidden font-montserrat">

  <!-- ── LEFT PANEL ── -->
  <div class="relative hidden md:block w-1/2 h-screen flex-shrink-0 overflow-hidden">
    <img
      src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=900&q=80"
      alt="Glowé"
      class="w-full h-full object-cover object-center"
    />
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="w-full md:w-1/2 h-screen bg-[#f5f2ed] flex items-center justify-center overflow-hidden px-8 sm:px-12 lg:px-16">
    <div class="w-full max-w-[400px] flex flex-col items-center text-center">

      <!-- Brand Logo -->
      <div class="flex items-center gap-2 mb-6 lg:mb-8">
        <svg class="w-[22px] h-[22px]" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 85 C50 85 20 70 18 45 C16 28 30 18 42 25 C46 27 49 32 50 38" stroke="#2a1f14" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M50 85 C50 85 80 70 82 45 C84 28 70 18 58 25 C54 27 51 32 50 38" stroke="#2a1f14" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M50 85 C50 85 50 55 50 38 C50 22 58 12 50 10 C42 12 50 22 50 38" stroke="#2a1f14" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="50" y1="85" x2="50" y2="72" stroke="#2a1f14" stroke-width="5.5" stroke-linecap="round"/>
        </svg>
        <span class="font-cormorant font-bold text-brand-dark text-[22px] tracking-[0.04em]">Glowé</span>
      </div>

      <!-- Heading -->
      <h1 class="font-cormorant font-bold text-brand-dark text-[34px] lg:text-[42px] xl:text-[48px] leading-tight mb-3">
        Forgot Password?
      </h1>

      <!-- Subtitle -->
      <p class="text-brand-muted text-[12px] lg:text-[13px] font-light leading-relaxed mb-7 lg:mb-8 max-w-[320px]">
        Please enter your email address to receive a password reset link.
      </p>

      <!-- FORM -->
      <form action="forget_password" method="POST" class="w-full">
        {% csrf_token %}

        <!-- Email Field -->
        <div class="w-full mb-5 text-left">
          <label for="email" class="block text-[10px] font-semibold tracking-[0.16em] text-brand-label uppercase mb-2">
            Email Address
          </label>
          <div class="relative">
            <!-- Mail icon -->
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-[16px] h-[16px] text-[#b0a49a]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M2 7l10 7 10-7"/>
            </svg>
            <input
              class="email-input"
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email address"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit"
          class="w-full py-[15px] lg:py-[17px] px-5 bg-brand-dark hover:bg-brand-darker text-[#f5f2ed] font-montserrat text-[11px] font-semibold tracking-[0.2em] uppercase border-none cursor-pointer flex items-center justify-center rounded-lg transition-colors duration-200">
          Send Reset Link
        </button>

      </form>

      <!-- Back to Sign In -->
      <a href="/login/"
        class="mt-8 lg:mt-10 text-[11px] text-brand-muted font-normal tracking-[0.12em] uppercase no-underline hover:text-brand-dark transition-colors duration-200 flex items-center gap-1.5">
        <span>←</span>
        <span>Back to Sign In</span>
      </a>

    </div>
  </div>

</body>
</html>
