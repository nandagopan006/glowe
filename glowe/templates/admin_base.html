<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Glowé Admin{% endblock %}</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          },
          colors: {
            sage: {
              50: '#f2f7f2', 100: '#e2f0e2', 200: '#c3dfc3',
              300: '#94c494', 400: '#64a864', 500: '#4a9050',
              600: '#3a7a3e', 700: '#2f6232', 800: '#264f29', 900: '#1e3e20',
            }
          }
        }
      }
    }
  </script>
  
  <style>
    * { 
      font-family: 'DM Sans', sans-serif; 
      box-sizing: border-box; 
    }
    body { 
      background: #f4f6f3; 
      margin: 0; 
    }

    /* Toast Animations */
    @keyframes toastIn { 
      from { opacity: 0; transform: translateY(-16px) scale(0.95); } 
      to { opacity: 1; transform: translateY(0) scale(1); } 
    }
    @keyframes toastOut { 
      from { opacity: 1; transform: translateY(0) scale(1); } 
      to { opacity: 0; transform: translateY(-10px) scale(0.95); } 
    }
    @keyframes toastProgress { 
      from { width: 100%; } 
      to { width: 0%; } 
    }

    .toast {
      animation: toastIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .toast.hide {
      animation: toastOut 0.3s ease forwards;
    }

    /* Main content offset for sidebar */
    .admin-main-content {
      margin-left: 0;
      transition: margin-left 0.3s ease-in-out;
    }
    @media (min-width: 1024px) {
      .admin-main-content {
        margin-left: 240px;
      }
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] flex flex-col items-center gap-3 pointer-events-none"></div>

  <!-- Signout Modal -->
  <div id="adminSignoutOverlay" class="fixed inset-0 bg-black/25 backdrop-blur-sm z-[9998] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-250" role="dialog" aria-modal="true">
    <div class="bg-white rounded-2xl p-9 w-[360px] max-w-[calc(100vw-32px)] flex flex-col items-center text-center transform scale-95 translate-y-2 transition-transform duration-280">
      <!-- Icon -->
      <div class="w-16 h-16 rounded-full bg-sage-50 flex items-center justify-center mb-5">
        <svg class="w-7 h-7 text-sage-600" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 2C9 5.5 6 9 6 13a6 6 0 0012 0c0-4-3-7.5-6-11z"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-gray-900 mb-2.5 leading-tight">
        Are you sure you want to<br>Sign Out?
      </h2>
      <p class="text-sm text-gray-600 mb-7 leading-relaxed max-w-[260px]">
        You will need to login again to access your admin dashboard.
      </p>
      <div class="flex gap-3 w-full">
        <button onclick="closeAdminSignoutModal()" class="flex-1 px-4 py-3 border-2 border-gray-200 rounded-xl bg-white text-gray-700 font-semibold text-sm hover:bg-gray-50 transition-colors">
          Cancel
        </button>
        <form method="POST" action="{% url 'admin_signout' %}" class="flex-1">
          {% csrf_token %}
          <button type="submit" class="w-full px-4 py-3 border-none rounded-xl bg-red-500 text-white font-semibold text-sm hover:bg-red-600 transition-colors shadow-lg shadow-red-500/30">
            Sign Out
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Include Sidebar -->
  {% include 'admin_sidebar.html' %}

  <!-- Main Content -->
  <div class="admin-main-content min-h-screen">
    
    <!-- Topbar -->
    <header class="sticky top-0 z-30 bg-white border-b border-gray-200 flex items-center px-4 lg:px-6 gap-4" style="height: 64px;">
      <!-- Mobile Menu Button -->
      <button onclick="toggleAdminSidebar()" class="lg:hidden w-9 h-9 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors flex-shrink-0">
        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

      <!-- Search Bar -->
      <div class="flex-1 max-w-sm">
        <div class="relative">
          <svg class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/>
            <path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" placeholder="Search analytics..." class="w-full pl-10 pr-4 py-2.5 rounded-lg bg-gray-50 border border-gray-200 text-sm text-gray-700 placeholder-gray-400 outline-none focus:border-gray-300 focus:bg-white transition-all"/>
        </div>
      </div>

      <!-- Spacer -->
      <div class="flex-1"></div>

      <!-- Right Side Actions -->
      <div class="flex items-center gap-3">
        <!-- View Sales Report Button -->
        <button class="hidden sm:flex items-center gap-2 px-5 py-2.5 bg-white border border-gray-300 rounded-lg text-gray-900 font-semibold text-sm hover:bg-gray-50 transition-colors uppercase tracking-wide" style="letter-spacing: 0.5px;">
          VIEW SALES REPORT
        </button>

        <!-- Notification Bell -->
        <button class="w-10 h-10 rounded-lg flex items-center justify-center hover:bg-gray-100 relative transition-colors flex-shrink-0">
          <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>

        <!-- User Profile Dropdown -->
        <div class="relative">
          <button onclick="toggleProfileDropdown()" id="profileDropdownBtn" class="flex items-center gap-2 px-1 py-1 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-sage-100 to-sage-200 flex items-center justify-center flex-shrink-0">
              {% if user.profile_image and user.profile_image.name != 'profile/default.png' %}
                <img src="{{ user.profile_image.url }}" alt="{{ user.username }}" class="w-full h-full rounded-full object-cover"/>
              {% else %}
                <span class="text-sage-700 font-bold text-xs">{{ user.username|first|upper }}</span>
              {% endif %}
            </div>
            <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

          <!-- Dropdown Menu -->
          <div id="profileDropdownMenu" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-xl border border-gray-200 py-2 z-50">
            <div class="px-4 py-3 border-b border-gray-100">
              <p class="text-sm font-semibold text-gray-900">{{ user.username }}</p>
              <p class="text-xs text-gray-500 mt-0.5 truncate">{{ user.email }}</p>
            </div>
            <a href="{% url 'profile_overview' %}" class="block px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
              <div class="flex items-center gap-3">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                Profile
              </div>
            </a>
            <a href="" class="block px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
              <div class="flex items-center gap-3">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                  <path stroke-linecap="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                Settings
              </div>
            </a>
            <div class="border-t border-gray-100 mt-2 pt-2">
              <button onclick="openAdminSignoutModal(); toggleProfileDropdown();" class="w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors">
                <div class="flex items-center gap-3">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                  </svg>
                  Sign Out
                </div>
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="p-4 sm:p-6">
      {% block content %}{% endblock %}
    </main>

  </div>

  <!-- Toast & Modal Scripts -->
  <script>
    // ── TOAST SYSTEM ──
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const icons = {
        success: `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`,
        error: `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 8v4M12 16h.01"/></svg>`,
      };
      const styles = {
        success: 'bg-white/95 border-2 border-sage-200 text-sage-800',
        error: 'bg-white/95 border-2 border-red-200 text-red-800',
      };
      const progressColors = {
        success: 'bg-sage-500',
        error: 'bg-red-500',
      };

      const toast = document.createElement('div');
      toast.className = `toast flex items-center gap-3 px-5 py-3.5 rounded-2xl text-sm font-medium min-w-[280px] max-w-[380px] pointer-events-auto shadow-xl backdrop-blur-md relative overflow-hidden ${styles[type]}`;
      toast.innerHTML = `
        ${icons[type]}
        <span class="flex-1">${message}</span>
        <button onclick="dismissToast(this.parentElement)" class="bg-transparent border-none cursor-pointer p-0 opacity-60 hover:opacity-100 transition-opacity">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
        <div class="absolute bottom-0 left-0 h-1 rounded-full ${progressColors[type]}" style="animation: toastProgress 3.5s linear forwards;"></div>
      `;
      container.appendChild(toast);
      toast._timer = setTimeout(() => dismissToast(toast), 3500);
    }

    function dismissToast(toast) {
      if (!toast || toast._dismissed) return;
      toast._dismissed = true;
      clearTimeout(toast._timer);
      toast.classList.add('hide');
      setTimeout(() => toast.remove(), 300);
    }

    // ── SIGNOUT MODAL ──
    function openAdminSignoutModal() {
      const overlay = document.getElementById('adminSignoutOverlay');
      overlay.classList.remove('opacity-0', 'pointer-events-none');
      overlay.classList.add('opacity-100', 'pointer-events-auto');
      overlay.querySelector('div').classList.remove('scale-95', 'translate-y-2');
      overlay.querySelector('div').classList.add('scale-100', 'translate-y-0');
    }

    function closeAdminSignoutModal() {
      const overlay = document.getElementById('adminSignoutOverlay');
      overlay.querySelector('div').classList.remove('scale-100', 'translate-y-0');
      overlay.querySelector('div').classList.add('scale-95', 'translate-y-2');
      setTimeout(() => {
        overlay.classList.remove('opacity-100', 'pointer-events-auto');
        overlay.classList.add('opacity-0', 'pointer-events-none');
      }, 150);
    }

    // Close modal on overlay click
    document.getElementById('adminSignoutOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeAdminSignoutModal();
    });

    // Close modal on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeAdminSignoutModal();
    });

    // ── SHOW DJANGO MESSAGES AS TOASTS ──
    window.addEventListener('load', () => {
      {% if messages %}
        {% for message in messages %}
          setTimeout(() => {
            showToast("{{ message|escapejs }}", "{{ message.tags|default:'success' }}");
          }, 400);
        {% endfor %}
      {% endif %}
    });

    // ── PROFILE DROPDOWN TOGGLE ──
    function toggleProfileDropdown() {
      const menu = document.getElementById('profileDropdownMenu');
      menu.classList.toggle('hidden');
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
      const dropdown = document.getElementById('profileDropdownMenu');
      const button = document.getElementById('profileDropdownBtn');
      
      if (dropdown && !dropdown.classList.contains('hidden') && !button.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.add('hidden');
      }
    });
  </script>

  {% block extra_js %}{% endblock %}

</body>
</html>
