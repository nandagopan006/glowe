<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Glowé Admin{% endblock %}</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          },
          colors: {
            sage: {
              50: '#f2f7f2', 100: '#e2f0e2', 200: '#c3dfc3',
              300: '#94c494', 400: '#64a864', 500: '#4a9050',
              600: '#3a7a3e', 700: '#2f6232', 800: '#264f29', 900: '#1e3e20',
            }
          }
        }
      }
    }
  </script>
  
  <style>
    * { font-family: 'DM Sans', sans-serif; box-sizing: border-box; }
    body { background: #f4f6f3; margin: 0; overflow-x: hidden; }
    @keyframes toastIn { from { opacity:0; transform:translateY(-16px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes toastOut { from { opacity:1; transform:translateY(0) scale(1); } to { opacity:0; transform:translateY(-10px) scale(0.95); } }
    @keyframes toastProgress { from { width:100%; } to { width:0%; } }
    .toast { animation: toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .toast.hide { animation: toastOut 0.3s ease forwards; }
  </style>

  {% block extra_css %}{% endblock %}

</head>
<body>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] flex flex-col items-center gap-3 pointer-events-none"></div>

  <!-- Signout Modal (MOVED TO admin_sidebar.html) -->

  <!-- TOPBAR / NAVBAR removed as per user request -->

  {% block content %}{% endblock %}

  <script>
    /* ── showToast(message, type) ─────────────────────────────────────────
       type: 'success' | 'error' | 'warning' | 'info'
       Called ONLY from this base template's window.load handler below.
       Child templates must NOT call showToast for Django messages.
    ──────────────────────────────────────────────────────────────────── */
    function showToast(message, type) {
      type = type || 'success';

      // Normalise Django tag strings like "messages success" → "success"
      if (type.indexOf('error')   !== -1) type = 'error';
      else if (type.indexOf('warning') !== -1) type = 'warning';
      else if (type.indexOf('info')    !== -1) type = 'info';
      else                                      type = 'success';

      const container = document.getElementById('toast-container');

      const icons = {
        success: `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`,
        error:   `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 8v4M12 16h.01"/></svg>`,
        warning: `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>`,
        info:    `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 16v-4M12 8h.01"/></svg>`,
      };
      const styles = {
        success: 'bg-white/95 border-2 border-sage-200 text-sage-800',
        error:   'bg-white/95 border-2 border-red-200 text-red-800',
        warning: 'bg-white/95 border-2 border-yellow-200 text-yellow-800',
        info:    'bg-white/95 border-2 border-blue-200 text-blue-800',
      };
      const progressColors = {
        success: 'bg-sage-500',
        error:   'bg-red-500',
        warning: 'bg-yellow-400',
        info:    'bg-blue-400',
      };

      const toast = document.createElement('div');
      toast.className = `toast flex items-center gap-3 px-5 py-3.5 rounded-2xl text-sm font-medium min-w-[280px] max-w-[380px] pointer-events-auto shadow-xl backdrop-blur-md relative overflow-hidden ${styles[type]}`;
      toast.innerHTML = `
        ${icons[type]}
        <span class="flex-1">${message}</span>
        <button onclick="dismissToast(this.parentElement)" class="bg-transparent border-none cursor-pointer p-0 opacity-60 hover:opacity-100 transition-opacity">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <div class="absolute bottom-0 left-0 h-1 rounded-full ${progressColors[type]}" style="animation:toastProgress 3.5s linear forwards;"></div>
      `;
      container.appendChild(toast);
      toast._timer = setTimeout(() => dismissToast(toast), 3500);
    }

    function dismissToast(toast) {
      if (!toast || toast._dismissed) return;
      toast._dismissed = true;
      clearTimeout(toast._timer);
      toast.classList.add('hide');
      setTimeout(() => toast.remove(), 300);
    }

    // Admin Signout logic (MOVED TO admin_sidebar.html)

    function toggleProfileDropdown() {
      document.getElementById('profileDropdownMenu').classList.toggle('hidden');
    }
    document.addEventListener('click', function(e) {
      const d = document.getElementById('profileDropdownMenu');
      const b = document.getElementById('profileDropdownBtn');
      if (d && !d.classList.contains('hidden') && !b.contains(e.target) && !d.contains(e.target))
        d.classList.add('hidden');
    });

    /* ── Single source of truth for Django messages ── */
    window.addEventListener('load', function() {
      {% if messages %}
        {% for message in messages %}
          setTimeout(function() {
            showToast("{{ message|escapejs }}", "{{ message.tags|escapejs }}");
          }, 400);
        {% endfor %}
      {% endif %}
    });
  </script>

  {% block extra_js %}{% endblock %}

</body>
</html>
