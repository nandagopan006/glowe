<!-- JavaScript for Sidebar Toggle -->
<script>
function toggleAdminSidebar() {
  const sidebar = document.getElementById('adminSidebar');
  const overlay = document.getElementById('adminSidebarOverlay');
  
  const isOpen = sidebar.classList.contains('translate-x-0');
  
  if (isOpen) {
    sidebar.classList.remove('translate-x-0');
    sidebar.classList.add('-translate-x-full');
    overlay.classList.remove('opacity-100', 'pointer-events-auto');
    overlay.classList.add('opacity-0', 'pointer-events-none');
    document.body.style.overflow = '';
  } else {
    sidebar.classList.remove('-translate-x-full');
    sidebar.classList.add('translate-x-0');
    overlay.classList.remove('opacity-0', 'pointer-events-none');
    overlay.classList.add('opacity-100', 'pointer-events-auto');
    document.body.style.overflow = 'hidden';
  }
}

// Close sidebar on escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const sidebar = document.getElementById('adminSidebar');
    if (sidebar.classList.contains('translate-x-0') && window.innerWidth < 1024) {
      toggleAdminSidebar();
    }
  }
});

// Close sidebar when clicking on navigation links (mobile only)
document.addEventListener('DOMContentLoaded', function() {
  if (window.innerWidth < 1024) {
    const navLinks = document.querySelectorAll('#adminSidebar nav a');
    navLinks.forEach(link => {
      link.addEventListener('click', function() {
        setTimeout(() => toggleAdminSidebar(), 150);
      });
    });
  }
});
</script>

</style>
